name: Build Paper Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Récupérer le code source
      uses: actions/checkout@v4

    - name: Configurer Java 21 (Requis pour la 1.21.1)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'gradle'

    - name: Rendre le script Gradle exécutable
      run: chmod +x ./gradlew

    - name: Compiler le plugin avec Gradle
      run: ./gradlew build

    - name: Télécharger le fichier .jar généré
      uses: actions/upload-artifact@v4
      with:
        name: TNT-Bow-Plugin
        path: build/libs/*.jar
